# .github/workflows/3d-contrib.yml
# Generates a stunning 3D isometric contribution calendar
# Output: output branch → profile-3d-contrib/profile-night-rainbow.svg
#
# ─── SECRETS REQUIRED ────────────────────────────────────────
#  GITHUB_TOKEN  →  provided automatically by GitHub Actions
# ──────────────────────────────────────────────────────────────

name: 🌐 Generate 3D Contribution Graph

on:
  schedule:
    - cron: "0 0 * * *"    # runs daily at midnight UTC
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-3d-profile
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history needed for contribution graph

      - name: 📝 Create settings file
        run: |
          cat > /tmp/settings.json << 'EOF'
          {
            "githubUserName": "${{ github.repository_owner }}",
            "startWeekday": 0,
            "themeName": "night-rainbow",
            "backgroundColor": "#0d0221",
            "foregroundColor": "#00d4ff",
            "outfileList": ["profile-3d-contrib/profile-night-rainbow.svg"]
          }
          EOF

      - name: 🌐 Generate 3D contribution calendar
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: /tmp/settings.json

      - name: 🚀 Push to output branch
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"

          # Use SAVE_DIR (avoid TMPDIR — reserved env variable in Linux)
          SAVE_DIR=$(mktemp -d)
          cp -r profile-3d-contrib/. "$SAVE_DIR/"

          # Switch to (or create) the output branch
          git fetch origin
          if git ls-remote --exit-code --heads origin output; then
            git checkout output
          else
            git checkout --orphan output
            git rm -rf . --quiet
          fi

          # Restore generated files from safe temp location
          mkdir -p profile-3d-contrib
          cp -r "$SAVE_DIR/." profile-3d-contrib/

          git add -A
          git diff --staged --quiet || \
            git commit -m "chore: update 3D contribution graph [skip ci]"
          git push origin output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
