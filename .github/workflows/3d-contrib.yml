# .github/workflows/3d-contrib.yml
# Generates a stunning 3D isometric contribution calendar
# Output: /output/profile-3d-contrib/profile-night-rainbow.svg

name: 🌐 Generate 3D Contribution Graph

on:
  schedule:
    - cron: "0 0 * * *"    # runs daily at midnight UTC
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-3d-profile

    steps:
      - uses: actions/checkout@v3

      - name: 🌐 Generate 3D contribution calendar
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        with:
          SETTING_JSON: |
            {
              "githubUserName": "${{ github.repository_owner }}",
              "startWeekday": 0,
              "themeName": "night-rainbow",
              "backgroundColor": "#0d0221",
              "foregroundColor": "#00d4ff",
              "outfileList": ["profile-3d-contrib/profile-night-rainbow.svg"]
            }

      - name: 🚀 Push to output branch
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"
          git add -A
          git fetch origin output
          git checkout output
          cp -r profile-3d-contrib .
          git add -A
          git commit -m "chore: update 3D contribution graph [skip ci]" || true
          git push origin output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
